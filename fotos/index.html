<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEON MAYER - Fotograf und Videograf</title>
    <link rel="stylesheet" href="/standard.css">
    <link rel="stylesheet" href="/fotos.css">
</head>
<body>
    <header id="headerJS"></header>

    <main>
        <div class="line"></div>
        <h2 class="collectionH">Behind The Scenes</h2>

        <div id="gallery">
            <script>
                let allPhotos;
                allPhotos = [
                    "250828_VinziRast_BTS-Fotos_021.jpg",
                    "250724_Johannes_Dahoam_BTS-Fotos_024.jpg",
                    "250828_VinziRast_BTS-Fotos_013.jpg",
                    "250801_Adesso_BTS-Fotos_009.jpg",
                    "250801_Adesso_BTS-Fotos_018.jpg",
                    "250801_Adesso_BTS-Fotos_010.jpg",
                ];

                for (let i = 1; i <= allPhotos.length; i++) {
                    document.writeln("<img src='/Bilder/LowRes/" + allPhotos[i-1] + "' class='galleryPhotos' loading='lazy' onclick='currentSlide(" + i + ")'>");
                }
            </script>
        </div>

    </main>    
    <div id="fullScreen">
        <button class="fullScreenButton" id="closeFullScreen" onclick="closeFullScreen()">✖</button>
        <button class="fullScreenButton" id="prev" onclick="plusSlides(-1)">&#10094;</button>
        <button class="fullScreenButton" id="next" onclick="plusSlides(+1)">&#10095;</button>
    </div>
    <div id="dynamic-gallery"></div>

    <footer id="footerJS"></footer>

    <script src="/nav.js"></script>
    <script src="/fotos.js"></script>
</body>
</html>
